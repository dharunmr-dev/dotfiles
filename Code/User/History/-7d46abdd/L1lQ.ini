[colors]
base = #000000
secondbase = #87A922
text = #F8CB2E
boxcolor = #87A922
crust = #11111b

[bar/toph]
monitor = ${env:MONITOR:}
width = 100%
height = 25 
margin-top = 0
margin-bottom = 0
bottom = true
radius = 0

background = ${colors.base}
foreground = ${colors.text}

line-size = 6pt
border-top-color = #222222
border-bottom-size=0
border-right-size=0
border-left-size=0
border-size=1
padding-left = 0
padding-right = 1

module-margin = 2
separator = " "

font-0 = SF Pro Font Mono:style=Medium:size=9.5;3

modules-left = xworkspaces xwindow
modules-right = pulseaudio battery memory cpu wireless-network wired-network secondbaseman date


cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true
dpi = 96

[module/systray]
type = internal/tray
format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces
label-active = %name%
label-active-background = ${colors.boxcolor}
label-active-foreground = ${colors.crust}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1
label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1
label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/secondbaseman]
type = custom/text
content = "%{T3}󰂯%{T-}"  
content-padding = 1
click-left = blueman-manager


[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "%{T3}%{T-} "
format-volume-prefix-foreground = ${colors.boxcolor}
label-volume = %percentage%%
label-muted = muted
label-muted-foreground = ${colors.secondbase}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.boxcolor}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.boxcolor}
label = %percentage:2%%

[module/battery]
type = internal/battery
format-prefix = "BAT "
format-prefix-foreground = ${colors.boxcolor}
full-at = 99
format-charging = <animation-charging> <label-charging>
animation-charging-0 = "%{T3}%{T-}"
animation-charging-1 = "%{T3}%{T-}"
animation-charging-2 = "%{T3}%{T-}"
animation-charging-3 = "%{T3}%{T-}"
animation-charging-4 = "%{T3}%{T-}"
animation-charging-framerate = 750
format-discharging = <ramp-capacity> <label-discharging>
ramp-capacity-0 = "%{T3}%{T-}"
ramp-capacity-1 = "%{T3}%{T-}"
ramp-capacity-2 = "%{T3}%{T-}"
ramp-capacity-3 = "%{T3}%{T-}"
ramp-capacity-4 = "%{T3}%{T-}"
low-at = 5
battery = BAT0
adapter = ADP1
poll-interval = 5

[module/date]
type = internal/date
interval = 1
date = %d-%m-%Y  %l:%M:%{F#87A922}%S
label = %date%
label-foreground = ${colors.text}

[settings]
screenchange-reload = true
pseudo-transparency = true

[module/wireless-network]
type = internal/network
interface = wlp3s0
interval = 1
unknown-as-up = true
format-connected-background = ${colors.background}
format-connected-foreground = ${colors.foreground}
format-connected-padding = 1
format-connected = %{A1:ronema:}<ramp-signal> <label-connected>%{A}
label-connected = %essid%
format-disconnected-background = ${colors.background}
format-disconnected-foreground = ${colors.foreground}
format-disconnected-padding = 1
format-disconnected = %{A1:ronema:}<label-disconnected>%{A}
label-disconnected ="%{T3}󰤮%{T-}"
ramp-signal-0 = "%{T3}󰤯%{T-}"
ramp-signal-1 = "%{T3}󰤟%{T-}"
ramp-signal-2 = "%{T3}󰤢%{T-}"
ramp-signal-3 = "%{T3}󰤥%{T-}"
ramp-signal-4 = "%{T3}󰤨%{T-}"
ramp-signal-foreground = ${colors.white}

[module/wireless-network-1]
type = internal/network
interface = wlp0s20f0u1
interval = 1
unknown-as-up = true
format-connected-background = ${colors.background}
format-connected-foreground = ${colors.foreground}
format-connected-padding = 1
format-connected = %{A1:ronema:}<ramp-signal> <label-connected>%{A}
label-connected = %essid%
format-disconnected-background = ${colors.background}
format-disconnected-foreground = ${colors.foreground}
format-disconnected-padding = 1
format-disconnected = %{A1:ronema:}<label-disconnected>%{A}
label-disconnected ="%{T3}󰤮%{T-}"
ramp-signal-0 = "%{T3}󰤯%{T-}"
ramp-signal-1 = "%{T3}󰤟%{T-}"
ramp-signal-2 = "%{T3}󰤢%{T-}"
ramp-signal-3 = "%{T3}󰤥%{T-}"
ramp-signal-4 = "%{T3}󰤨%{T-}"
ramp-signal-foreground = ${colors.white}

[module/custom-wireless-network]
type = custom/script
exec = cat ~/.config/polybar/wireless_status
click-left = ~/.config/polybar/toggle_wireless_ip.sh
label-padding = 1
label-foreground = ${colors.foreground}
format-connected-background = ${colors.background}
interval = 1

[module/wired-network]
type = custom/script
exec = ~/.config/polybar/wired_script.sh
interval = 1
label-disconnected = "%{T3}󰌺%{T-}"


[module/custom-wired-network]
type = custom/script
exec = cat ~/.config/polybar/wired_status
click-left = ~/.config/polybar/toggle_wired_ip.sh
label-padding = 1
label-foreground = ${colors.foreground}
format-connected-background = ${colors.background}
interval = 1
