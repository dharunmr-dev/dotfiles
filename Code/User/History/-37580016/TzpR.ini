[colors]
background = #282A2E
background-alt = #373B41
foreground = #C5C8C6
primary = #F0C674
secondary = #8ABEB7
alert = #A54242
disabled = #707880

[bar/bar1]
width = 100%
height = 24pt
radius = 0
margin-top = 0
margin-bottom = 0
bottom = true
dpi = 96
background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 1pt
border-color = #00000000
border-bottom-size=0
border-right-size=0
border-left-size=0

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = JetBrainsMono NFM:style=Bold:size=9;2
font-1 = MesloLGS Nerd Font Mono:style=Bold:size=16;2

modules-left = xworkspaces xwindow
modules-right =  pulseaudio memory cpu wireless-network secondbaseman wired-network battery date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

; This module is not active by default (to enable it, add it to one of the
; modules-* list above).
; Please note that only a single tray can exist at any time. If you launch
; multiple bars with this module, only a single one will show it, the others
; will produce a warning. Which bar gets the module is timing dependent and can
; be quite random.
; For more information, see the documentation page for this module:
; https://polybar.readthedocs.io/en/stable/user/modules/tray.html
[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/secondbaseman]
type = custom/text
content = "%{T1}ůįāĮ%{T-}"  
content-padding = 1
click-left = blueman-manager

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "%{T2}ůįēĺ%{T-} "
format-volume-prefix-foreground = ${colors.boxcolor}
label-volume = %percentage%%
label-muted = muted
label-muted-foreground = ${colors.secondbase}


[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

; [module/memory]
; type = internal/memory
; interval = 2
; format-prefix = "RAMÓÄ® "
; format-prefix-foreground = ${colors.primary}
; label = %percentage_used%% (%mb_free% free) (%mb_swap_used% swap)

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

; [module/cpu]
; type = internal/cpu
; interval = 1
; format = <label> <ramp-coreload>
; format-prefix = "CPUÓÄ¶ "
; format-prefix-foreground = ${colors.primary}
; label = %percentage:2%%
; ramp-coreload-0 = ‚ĖĀ
; ramp-coreload-1 = ‚Ėā
; ramp-coreload-2 = ‚ĖÉ
; ramp-coreload-3 = ‚ĖĄ
; ramp-coreload-4 = ‚ĖÖ
; ramp-coreload-5 = ‚ĖÜ
; ramp-coreload-6 = ‚Ėá
; ramp-coreload-7 = ‚Ėą

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wireless-network]
type = internal/network
interface = wlo1
interval = 3.0
unknown-as-up = true
format-connected-background = ${colors.background}
format-connected-foreground = ${colors.foreground}
format-connected-padding = 1
format-connected = %{A1:ronema:}<ramp-signal> <label-connected>%{A}
label-connected = %essid%
format-disconnected-background = ${colors.background}
format-disconnected-foreground = ${colors.foreground}
format-disconnected-padding = 1
format-disconnected = %{A1:ronema:}<label-disconnected>%{A}
label-disconnected ="%{T2}ůį§ģ%{T-}"
ramp-signal-0 = "%{T2}ůį§Į%{T-}"
ramp-signal-1 = "%{T2}ůį§ü%{T-}"
ramp-signal-2 = "%{T2}ůį§Ę%{T-}"
ramp-signal-3 = "%{T2}ůį§•%{T-}"
ramp-signal-4 = "%{T2}ůį§®%{T-}"
ramp-signal-foreground = ${colors.white}

[module/wired-network]
type = internal/network
interface = eno1
interval = 3.0
format-connected-background = ${colors.background}
format-connected-foreground = ${colors.foreground}
format-connected-padding = 1
format-connected = %{A1:ronema:}<label-connected>%{A}
label-connected = ÔÉĀ %local_ip%
format-disconnected-background = ${colors.background}
format-disconnected-foreground = ${colors.foreground-alt}
format-disconnected-padding = 1
format-disconnected = %{A1:ronema:}<label-disconnected>%{A}
label-disconnected ="ůįĆļ"

[module/battery]
type = internal/battery
format-prefix = "BAT "
format-prefix-foreground = ${colors.primary}
full-at = 99
format-charging = <animation-charging> <label-charging>
animation-charging-0 = "%{T2}ÔČĄ%{T-}"
animation-charging-1 = "%{T2}ÔČÉ%{T-}"
animation-charging-2 = "%{T2}ÔČā%{T-}"
animation-charging-3 = "%{T2}ÔČĀ%{T-}"
animation-charging-4 = "%{T2}ÔČÄ%{T-}"
animation-charging-framerate = 750
format-discharging = <ramp-capacity> <label-discharging>
ramp-capacity-0 = "%{T2}%{F#FF0000}ÔČĄ%{F-}%{T-}"
ramp-capacity-1 = "%{T2}ÔČÉ%{T-}"
ramp-capacity-2 = "%{T2}ÔČā%{T-}"
ramp-capacity-3 = "%{T2}%{F#33cc33}ÔČĀ%{F-}%{T-}"
ramp-capacity-4 = "%{T2}%{F#00ff00}ÔČÄ%{T-}"
low-at = 5
battery = BAT0
adapter = ADP1
poll-interval = 5
#00ff00
[module/date]
type = internal/date
interval = 1
date = %d-%m-%Y %I:%M:%S
; date-alt = %d-%m-%Y %I:%M:%S

label = %date%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
